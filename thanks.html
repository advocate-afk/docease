<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Payment Successful — DocEase</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f0fdf4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:36px;max-width:440px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.1);text-align:center}
.icon{font-size:60px;margin-bottom:16px}
.title{font-size:24px;font-weight:800;color:#0f172a;margin-bottom:8px}
.sub{font-size:14px;color:#64748b;margin-bottom:28px}
.video-box{background:linear-gradient(135deg,#1e40af,#0d9488);border-radius:14px;padding:22px;margin-bottom:20px;color:#fff}
.video-box h3{font-size:17px;font-weight:700;margin-bottom:8px}
.video-box p{font-size:13px;opacity:.85;margin-bottom:16px}
.join-btn{display:block;background:#fff;color:#1e40af;padding:13px 24px;border-radius:10px;font-weight:800;font-size:15px;text-decoration:none;transition:.2s}
.join-btn:hover{background:#eff6ff}
.info-box{background:#f8fafc;border-radius:10px;padding:16px;margin-bottom:16px;text-align:left}
.info-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #e2e8f0;font-size:13px}
.info-row:last-child{border:none}
.info-label{color:#64748b}.info-val{font-weight:700;color:#0f172a}
.wa-btn{display:block;background:#25d366;color:#fff;padding:12px 24px;border-radius:10px;font-weight:700;font-size:14px;text-decoration:none;margin-bottom:10px}
.home-btn{display:block;background:#f1f5f9;color:#334155;padding:12px 24px;border-radius:10px;font-weight:600;font-size:14px;text-decoration:none}
.loader{display:flex;flex-direction:column;align-items:center;padding:20px}
.sp{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#0d9488;border-radius:50%;animation:sp .8s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="mainCard">
  <div class="loader" id="loader">
    <div class="sp"></div>
    <div style="font-size:14px;color:#64748b">Processing your payment...</div>
  </div>
</div>

<script>
const QS = new URLSearchParams(location.search);
const room = QS.get("room") || "";
const fee = QS.get("fee") || "0";
const aptId = QS.get("aptId") || "";
const payId = QS.get("payId") || "";
const joinUrl = "https://meet.jit.si/" + room;

// Build WhatsApp message
const waMsg = encodeURIComponent(
  "🎉 *DocEase Video Consult Confirmed!*\n\n" +
  "💳 Payment: ₹" + fee + " paid\n" +
  "🔗 Join Video Call:\n" + joinUrl + "\n\n" +
  "Use Chrome browser. Join on time."
);
const waLink = "https://wa.me/?text=" + waMsg;

// Notify backend in background (fire and forget)
if(aptId && payId) {
  const url = DC.BACKEND + "?action=verifyPatientPayment&aptId=" 
    + encodeURIComponent(aptId) + "&payId=" + encodeURIComponent(payId);
  fetch(url).catch(()=>{});
}

// Show confirmation after short delay
setTimeout(() => {
  document.getElementById("mainCard").innerHTML = `
    <div class="icon">🎉</div>
    <div class="title">Payment Successful!</div>
    <div class="sub">Your video consultation is confirmed</div>
    <div class="video-box">
      <h3>🎥 Video Call Ready</h3>
      <p>Join at your scheduled time. Use Chrome browser for best experience.</p>
      <a href="${joinUrl}" target="_blank" class="join-btn">Join Video Call →</a>
    </div>
    <div class="info-box">
      <div class="info-row"><span class="info-label">Amount Paid</span><span class="info-val">₹${fee}</span></div>
      <div class="info-row"><span class="info-label">Payment ID</span><span class="info-val" style="font-size:11px">${payId||"—"}</span></div>
      <div class="info-row"><span class="info-label">Video Room</span><span class="info-val" style="font-size:11px">${room||"—"}</span></div>
    </div>
    <a href="${waLink}" target="_blank" class="wa-btn">📲 Save on WhatsApp</a>
    <a href="index.html" class="home-btn">← Back to Home</a>
  `;
}, 1500);
</script>
</body>
</html>
